name: Update WinGet Manifest

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0.0)'
        required: false
        type: string
      release_tag:
        description: 'Release tag (e.g., v1.0.0.0)'
        required: false
        type: string

env:
  EXTENSION_NAME: AdbExtension
  GITHUB_USER_NAME: CostaFot
  GITHUB_REPO: AdbExtension
  WINGET_PACKAGE_ID: CostaFotiadis.ADBExtensionforCommandPalette

jobs:
  update-winget:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get release info
        id: release
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.version }}" -ne "") {
            echo "VERSION=${{ inputs.version }}" >> $env:GITHUB_OUTPUT
            echo "TAG=${{ inputs.release_tag }}" >> $env:GITHUB_OUTPUT
          } elseif ("${{ github.event_name }}" -eq "release") {
            $version = "${{ github.event.release.tag_name }}" -replace "^v", ""
            echo "VERSION=$version" >> $env:GITHUB_OUTPUT
            echo "TAG=${{ github.event.release.tag_name }}" >> $env:GITHUB_OUTPUT
          } else {
            $latestRelease = gh release list --limit 1 --json tagName | ConvertFrom-Json
            $tag = $latestRelease.tagName
            $version = $tag -replace "^v", ""
            echo "VERSION=$version" >> $env:GITHUB_OUTPUT
            echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh

      - name: Install wingetcreate
        run: iwr https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
        shell: pwsh

      - name: Update WinGet manifest
        env:
          GITHUB_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          $version = "${{ steps.release.outputs.VERSION }}"
          $tag = "${{ steps.release.outputs.TAG }}"

          $bundleUrl = "https://github.com/${{ env.GITHUB_USER_NAME }}/${{ env.GITHUB_REPO }}/releases/download/$tag/${{ env.EXTENSION_NAME }}_${version}_Bundle.msixbundle"

          Write-Host "Updating WinGet manifest for version $version"
          Write-Host "Bundle URL: $bundleUrl"

          .\wingetcreate.exe update ${{ env.WINGET_PACKAGE_ID }} `
            --version $version `
            --urls "$bundleUrl|x64" "$bundleUrl|arm64" `
            --token "${{ secrets.WINGET_TOKEN }}" `
            --submit
        shell: pwsh
